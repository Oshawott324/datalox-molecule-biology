name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: MCP stdio smoke test
        run: npm run smoke:mcp

      - name: MCP non-repo cwd smoke test
        run: npm run smoke:mcp:cwd

      - name: Eval corpus v0 check
        run: npm run eval:corpus:v0:check

      - name: pUC19 MCP demo
        run: npm run demo:puc19:mcp

      - name: Replay demo
        run: npm run replay:demo
